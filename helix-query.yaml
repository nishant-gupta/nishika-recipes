indices:
  recipes:
    include:
      - /**
    exclude:
      - /drafts/**
    target: /query-index.json
    properties:
      title:
        select: h1
        value: |
          innerHTML(el)
      description:
        select: p
        value: |
          textContent(el)
      image:
        selectFirst: img
        value: attribute(el, "src")
      issue:
        select: meta[name="issue"]
        value: attribute(el, "content")
      type:
        select: meta[name="type"]
        value: attribute(el, "content")
