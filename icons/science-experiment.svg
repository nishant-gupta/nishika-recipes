<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- flask neck -->
  <rect x="9" y="3" width="6" height="7" rx="1" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.85)" stroke-width="1.5"/>
  <!-- flask body -->
  <path d="M9 10 L4 19 Q3.5 21 5 21 L19 21 Q20.5 21 20 19 L15 10 Z" fill="rgba(80,180,255,0.3)" stroke="rgba(255,255,255,0.85)" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- liquid -->
  <path d="M6 17 Q8 15 12 16 Q16 17 18 15 L19 19 Q20.5 21 19 21 L5 21 Q3.5 21 4 19 Z" fill="rgba(80,180,255,0.75)"/>
  <!-- bubbles -->
  <circle cx="10" cy="18" r="1.2" fill="rgba(255,255,255,0.55)"/>
  <circle cx="14" cy="16.5" r="0.9" fill="rgba(255,255,255,0.45)"/>
  <!-- rim -->
  <line x1="8" y1="3" x2="16" y2="3" stroke="rgba(255,255,255,0.85)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
