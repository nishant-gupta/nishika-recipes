<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" fill="none">
  <!-- outer ring -->
  <circle cx="36" cy="36" r="34" fill="rgba(255,160,40,0.15)" stroke="rgba(255,160,40,0.5)" stroke-width="1.5"/>
  <!-- paintbrush — all parts in one group, rotated together -->
  <g transform="rotate(-35 36 36)">
    <!-- handle (wooden, rounded ends) -->
    <rect x="33" y="9" width="6" height="24" rx="3" fill="#E8C060"/>
    <!-- handle shine -->
    <rect x="34.5" y="11" width="2" height="10" rx="1" fill="rgba(255,255,255,0.35)"/>
    <!-- ferrule (metal band) -->
    <rect x="31" y="33" width="10" height="6" rx="1.5" fill="#A08840"/>
    <!-- bristles — tapered teardrop pointing down -->
    <path d="M32 39 Q31 49 34.5 58 L37.5 58 Q41 49 40 39 Z" fill="#E05828"/>
    <!-- bristle highlight -->
    <path d="M33.5 41 Q32.5 49 35 56" stroke="rgba(255,210,170,0.4)" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <!-- large 4-point sparkle top-right -->
  <path d="M54 12l1.2 3.6 3.6 1.2-3.6 1.2L54 21.6l-1.2-3.6-3.6-1.2 3.6-1.2z" fill="rgba(255,215,0,0.9)"/>
  <!-- medium sparkle left -->
  <path d="M15 28l1 3 3 1-3 1-1 3-1-3-3-1 3-1z" fill="rgba(255,215,0,0.75)"/>
  <!-- small sparkle bottom-right -->
  <path d="M56 50l0.7 2.1 2.1 0.7-2.1 0.7L56 55.6l-0.7-2.1-2.1-0.7 2.1-0.7z" fill="rgba(255,180,60,0.8)"/>
  <!-- tiny dot accents -->
  <circle cx="20" cy="16" r="2" fill="rgba(255,215,0,0.6)"/>
  <circle cx="58" cy="34" r="1.5" fill="rgba(255,215,0,0.5)"/>
  <circle cx="14" cy="54" r="1.5" fill="rgba(255,160,40,0.6)"/>
</svg>
