<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- telescope barrel -->
  <rect x="3" y="9" width="12" height="5" rx="1.5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- eyepiece (narrower end, right) -->
  <rect x="15" y="10.5" width="4" height="2" rx="1" fill="#7c3aed"/>
  <!-- lens cap (wider end, left) -->
  <rect x="2" y="8" width="2" height="7" rx="1" fill="#a78bfa"/>
  <!-- tripod stand -->
  <line x1="9" y1="14" x2="6" y2="21" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9" y1="14" x2="12" y2="21" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round"/>
  <!-- star being observed -->
  <path d="M20 3l.6 1.8 1.8.6-1.8.6L20 7.8l-.6-1.8-1.8-.6 1.8-.6z" fill="#f59e0b"/>
  <!-- small star -->
  <circle cx="18" cy="6" r="1" fill="#fbbf24"/>
</svg>
